# ============================================================
# Hyprlock — Screen locker
# Theme: Catppuccin Mocha (same palette as Omarchy)
# ============================================================

background {
    monitor =
    path    = screenshot           # Blurs current screen
    blur_size    = 4
    blur_passes  = 3
    brightness   = 0.5
    contrast     = 0.9
    vibrancy     = 0.2
    vibrancy_darkness = 0.0
}

input-field {
    monitor  =
    size     = 300, 50
    outline_thickness = 2
    dots_size    = 0.25
    dots_spacing = 0.3
    dots_rounding = -1
    outer_color  = #313244
    inner_color  = #1e1e2e
    font_color   = #cdd6f4
    fade_on_empty = true
    placeholder_text = <span foreground="##6c7086" font_family="JetBrainsMono Nerd Font" font_size="13"> Password</span>
    hide_input   = false
    rounding     = 6
    check_color  = #a6e3a1
    fail_color   = #f38ba8
    fail_text    = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_timeout = 2000
    capslock_color = -1

    position    = 0, -60
    halign      = center
    valign      = center
}

label {
    monitor  =
    text     = $TIME
    color    = #cdd6f4
    font_size   = 64
    font_family = JetBrainsMono Nerd Font
    position    = 0, 160
    halign      = center
    valign      = center
}

label {
    monitor  =
    text     = cmd[update:3600000] echo "$(date +"%A, %d %B %Y")"
    color    = #a6adc8
    font_size   = 18
    font_family = JetBrainsMono Nerd Font
    position    = 0, 80
    halign      = center
    valign      = center
}
