# ============================================================
# Kitty Terminal — Omarchy-identical config
# Theme: Catppuccin Mocha
# Font: JetBrainsMono Nerd Font (same as Omarchy)
# ============================================================

# --- Catppuccin Mocha color palette ---
foreground            #cdd6f4
background            #1e1e2e
selection_foreground  #1e1e2e
selection_background  #cdd6f4

# Cursor
cursor                #f5e0dc
cursor_text_color     #1e1e2e

# URL underline color when hovering
url_color             #f5e0dc

# Window border colors
active_border_color   #b4befe
inactive_border_color #6c7086
bell_border_color     #f9e2af

# Tab bar colors
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# Marks
mark1_foreground #1e1e2e
mark1_background #b4befe
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec

# --- 16 terminal colors ---
# Black
color0  #45475a
color8  #585b70

# Red
color1  #f38ba8
color9  #f38ba8

# Green
color2  #a6e3a1
color10 #a6e3a1

# Yellow
color3  #f9e2af
color11 #f9e2af

# Blue
color4  #89b4fa
color12 #89b4fa

# Magenta
color5  #f5c2e7
color13 #f5c2e7

# Cyan
color6  #94e2d5
color14 #94e2d5

# White
color7  #bac2de
color15 #a6adc8

# ============================================================
# Font (Omarchy default)
# ============================================================
font_family        JetBrainsMono Nerd Font
bold_italic_font   auto
font_size          9.0

# ============================================================
# Window (Omarchy default)
# ============================================================
window_padding_width  14
hide_window_decorations yes
confirm_os_window_close 0

# ============================================================
# Keybindings (Omarchy default)
# ============================================================
map ctrl+insert  copy_to_clipboard
map shift+insert paste_from_clipboard

# ============================================================
# Aesthetics (Omarchy default)
# ============================================================
cursor_shape           block
cursor_blink_interval  0
shell_integration      no-cursor
enable_audio_bell      no
allow_remote_control   yes

# ============================================================
# Tab bar (Omarchy default — powerline slanted)
# ============================================================
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
tab_title_template  {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
