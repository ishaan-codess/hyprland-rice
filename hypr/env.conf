# ============================================================
# Environment Variables — Omarchy-identical
# ============================================================

# Cursor size
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Force all apps to use Wayland natively
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_STYLE_OVERRIDE,kvantum
env = SDL_VIDEODRIVER,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland
env = XDG_SESSION_TYPE,wayland

# Desktop identification (needed for screen sharing)
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# XWayland: force zero scaling to avoid blurry XWayland apps
xwayland {
  force_zero_scaling = true
}

# Gum (TUI prompts) — match terminal theme
env = GUM_CONFIRM_PROMPT_FOREGROUND,6
env = GUM_CONFIRM_SELECTED_FOREGROUND,0
env = GUM_CONFIRM_SELECTED_BACKGROUND,2
env = GUM_CONFIRM_UNSELECTED_FOREGROUND,7
env = GUM_CONFIRM_UNSELECTED_BACKGROUND,8

# Suppress Hyprland ecosystem update notifications
ecosystem {
  no_update_news = true
}
