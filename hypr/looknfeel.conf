# ============================================================
# Look & Feel — Omarchy Catppuccin (Mocha) theme
# Color palette: https://catppuccin.com/palette
#   Mocha base:    #1e1e2e
#   Mocha surface: #313244
#   Mocha text:    #cdd6f4
#   Mocha mauve:   #cba6f7
#   Mocha blue:    #89b4fa
#   Omarchy active border: cyan→green gradient (stock default)
# ============================================================

# --- Border colors (Omarchy defaults) ---
$activeBorderColor   = rgba(33ccffee) rgba(00ff99ee) 45deg
$inactiveBorderColor = rgba(595959aa)

# --- General ---
general {
    gaps_in  = 5
    gaps_out = 10

    border_size = 2

    col.active_border   = $activeBorderColor
    col.inactive_border = $inactiveBorderColor

    resize_on_border = false
    allow_tearing    = false

    layout = dwindle
}

# --- Decoration ---
decoration {
    rounding = 0

    shadow {
        enabled      = true
        range        = 2
        render_power = 3
        color        = rgba(1a1a1aee)
    }

    blur {
        enabled    = true
        size       = 2
        passes     = 2
        special    = true
        brightness = 0.60
        contrast   = 0.75
    }
}

# --- Groups ---
group {
    col.border_active          = $activeBorderColor
    col.border_inactive        = $inactiveBorderColor
    col.border_locked_active   = -1
    col.border_locked_inactive = -1

    groupbar {
        font_size            = 12
        font_family          = monospace
        font_weight_active   = ultraheavy
        font_weight_inactive = normal

        indicator_height = 0
        indicator_gap    = 5
        height           = 22
        gaps_in          = 5
        gaps_out         = 0

        text_color          = rgb(ffffff)
        text_color_inactive = rgba(ffffff90)
        col.active          = rgba(00000040)
        col.inactive        = rgba(00000020)

        gradients              = true
        gradient_rounding      = 0
        gradient_round_only_edges = false
    }
}

# --- Animations (Omarchy easeOutQuint — identical) ---
animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global,           1, 10,  default
    animation = border,           1, 5.39, easeOutQuint
    animation = windows,          1, 3.79, easeOutQuint
    animation = windowsIn,        1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,       1, 1.49, linear,       popin 87%
    animation = fadeIn,           1, 1.73, almostLinear
    animation = fadeOut,          1, 1.46, almostLinear
    animation = fade,             1, 3.03, quick
    animation = layers,           1, 3.81, easeOutQuint
    animation = layersIn,         1, 4,    easeOutQuint, fade
    animation = layersOut,        1, 1.5,  linear,       fade
    animation = fadeLayersIn,     1, 1.79, almostLinear
    animation = fadeLayersOut,    1, 1.39, almostLinear
    animation = workspaces,       0, 0,    ease
    animation = specialWorkspace, 1, 3,    easeOutQuint, slidevert
}

# --- Layouts ---
dwindle {
    pseudotile     = true
    preserve_split = true
    force_split    = 2            # Always split right
}

master {
    new_status = master
}

# --- Misc ---
misc {
    disable_hyprland_logo      = true
    disable_splash_rendering   = true
    disable_scale_notification = true
    focus_on_activate          = true
    anr_missed_pings           = 3
    on_focus_under_fullscreen  = 1
}

# --- Cursor ---
cursor {
    hide_on_key_press      = true
    warp_on_change_workspace = 1
}

# --- Binds ---
binds {
    hide_special_on_workspace_change = true
}
