# ============================================================
# Window Rules — Omarchy-equivalent
# ============================================================

# Suppress maximize events (Omarchy default)
windowrule = suppress_event maximize, match:class .*

# Tag all windows for default opacity
windowrule = tag +default-opacity, match:class .*

# Fix XWayland drag/drop glitch (Omarchy default)
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Apply default opacity (97% active / 90% inactive — Omarchy default)
windowrule = opacity 0.97 0.9, match:tag default-opacity

# Float specific apps (common utilities)
windowrule = float, match:class ^(pavucontrol|nm-connection-editor|blueman-manager)$
windowrule = float, match:title ^(Open File|Save File|File Upload)$
windowrule = center, match:class ^(pavucontrol|nm-connection-editor|blueman-manager)$

# Picture-in-picture
windowrule = float, match:title ^Picture-in-Picture$
windowrule = pin,   match:title ^Picture-in-Picture$
