# ============================================================
# Autostart — Omarchy-equivalent (no Omarchy binaries)
# ============================================================

# Wallpaper (hyprpaper replaces Omarchy's swaybg)
exec-once = hyprpaper

# Notification daemon (same as Omarchy)
exec-once = mako

# Status bar (same as Omarchy)
exec-once = waybar

# Idle management + screen locker (same as Omarchy)
exec-once = hypridle

# Polkit auth agent (same as Omarchy)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# OSD for volume/brightness (same as Omarchy)
exec-once = swayosd-server

# Fix slow app launch — sync systemd environment
exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd --all
