# ============================================================
# Hyprpaper — Wallpaper daemon config
# ============================================================
# Place your wallpaper at ~/.config/hypr/wallpaper.jpg (or .png)
# Change the path to your actual wallpaper file.
# 
# Catppuccin Mocha recommended wallpapers:
#   https://github.com/zhichaoh/catppuccin-wallpapers
#   Download one and set the path below.
# ============================================================

preload = ~/.config/hypr/wallpaper.jpg
wallpaper = , ~/.config/hypr/wallpaper.jpg

# Disable splash "hyprpaper" text
splash = false
