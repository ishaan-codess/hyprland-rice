# ============================================================
# Hyprpaper — Wallpaper daemon config
#
# The install.sh copies wallpapers/wallpaper.jpg from this repo to:
#   ~/.config/hypr/wallpaper.jpg
#
# To change wallpaper: replace the file at that path and reload:
#   hyprpaper --reload
#
# Lock screen: uses a blurred screenshot — no separate file needed.
# ============================================================

preload = ~/.config/hypr/wallpaper.jpg
wallpaper = , ~/.config/hypr/wallpaper.jpg

# Disable splash "hyprpaper" text
splash = false
