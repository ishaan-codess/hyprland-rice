# ============================================================
# Keybindings — Omarchy-compatible (no Omarchy binaries)
# Replace `kitty` with your terminal of choice
# ============================================================

$terminal = kitty
$launcher = wofi --show drun
$locker   = hyprlock

# -----------------------------------------------------------------------
# Applications
# -----------------------------------------------------------------------
bind  = SUPER, RETURN, exec, $terminal
bind  = SUPER, SPACE,  exec, $launcher

# -----------------------------------------------------------------------
# Window management (identical to Omarchy)
# -----------------------------------------------------------------------
bind  = SUPER,       W,     killactive,
bind  = SUPER,       T,     togglefloating,
bind  = SUPER,       F,     fullscreen, 0
bind  = SUPER CTRL,  F,     fullscreenstate, 0 2
bind  = SUPER ALT,   F,     fullscreen, 1
bind  = SUPER,       J,     layoutmsg, togglesplit
bind  = SUPER,       P,     pseudo

# Move focus
bind  = SUPER, LEFT,  movefocus, l
bind  = SUPER, RIGHT, movefocus, r
bind  = SUPER, UP,    movefocus, u
bind  = SUPER, DOWN,  movefocus, d

# Swap windows
bind  = SUPER SHIFT, LEFT,  swapwindow, l
bind  = SUPER SHIFT, RIGHT, swapwindow, r
bind  = SUPER SHIFT, UP,    swapwindow, u
bind  = SUPER SHIFT, DOWN,  swapwindow, d

# Resize windows (- and = keys)
bind  = SUPER,       code:20, resizeactive, -100 0
bind  = SUPER,       code:21, resizeactive,  100 0
bind  = SUPER SHIFT, code:20, resizeactive,  0 -100
bind  = SUPER SHIFT, code:21, resizeactive,  0  100

# Move/resize with mouse
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# -----------------------------------------------------------------------
# Workspaces (identical to Omarchy)
# -----------------------------------------------------------------------
bind  = SUPER, code:10, workspace, 1
bind  = SUPER, code:11, workspace, 2
bind  = SUPER, code:12, workspace, 3
bind  = SUPER, code:13, workspace, 4
bind  = SUPER, code:14, workspace, 5
bind  = SUPER, code:15, workspace, 6
bind  = SUPER, code:16, workspace, 7
bind  = SUPER, code:17, workspace, 8
bind  = SUPER, code:18, workspace, 9
bind  = SUPER, code:19, workspace, 10

# Move window to workspace
bind  = SUPER SHIFT, code:10, movetoworkspace, 1
bind  = SUPER SHIFT, code:11, movetoworkspace, 2
bind  = SUPER SHIFT, code:12, movetoworkspace, 3
bind  = SUPER SHIFT, code:13, movetoworkspace, 4
bind  = SUPER SHIFT, code:14, movetoworkspace, 5
bind  = SUPER SHIFT, code:15, movetoworkspace, 6
bind  = SUPER SHIFT, code:16, movetoworkspace, 7
bind  = SUPER SHIFT, code:17, movetoworkspace, 8
bind  = SUPER SHIFT, code:18, movetoworkspace, 9
bind  = SUPER SHIFT, code:19, movetoworkspace, 10

# Move window to workspace silently
bind  = SUPER SHIFT ALT, code:10, movetoworkspacesilent, 1
bind  = SUPER SHIFT ALT, code:11, movetoworkspacesilent, 2
bind  = SUPER SHIFT ALT, code:12, movetoworkspacesilent, 3
bind  = SUPER SHIFT ALT, code:13, movetoworkspacesilent, 4
bind  = SUPER SHIFT ALT, code:14, movetoworkspacesilent, 5
bind  = SUPER SHIFT ALT, code:15, movetoworkspacesilent, 6
bind  = SUPER SHIFT ALT, code:16, movetoworkspacesilent, 7
bind  = SUPER SHIFT ALT, code:17, movetoworkspacesilent, 8
bind  = SUPER SHIFT ALT, code:18, movetoworkspacesilent, 9
bind  = SUPER SHIFT ALT, code:19, movetoworkspacesilent, 10

# Workspace scroll/navigation
bind  = SUPER,       TAB,       workspace, e+1
bind  = SUPER SHIFT, TAB,       workspace, e-1
bind  = SUPER CTRL,  TAB,       workspace, previous
bind  = SUPER,       mouse_down, workspace, e+1
bind  = SUPER,       mouse_up,   workspace, e-1

# Move workspace to other monitors
bind  = SUPER SHIFT ALT, LEFT,  movecurrentworkspacetomonitor, l
bind  = SUPER SHIFT ALT, RIGHT, movecurrentworkspacetomonitor, r
bind  = SUPER SHIFT ALT, UP,    movecurrentworkspacetomonitor, u
bind  = SUPER SHIFT ALT, DOWN,  movecurrentworkspacetomonitor, d

# -----------------------------------------------------------------------
# Scratchpad (identical to Omarchy)
# -----------------------------------------------------------------------
bind  = SUPER,     S,    togglespecialworkspace, scratchpad
bind  = SUPER ALT, S,    movetoworkspacesilent,  special:scratchpad

# -----------------------------------------------------------------------
# Alt+Tab window cycling (identical to Omarchy)
# -----------------------------------------------------------------------
bind  = ALT,       TAB,  cyclenext
bind  = ALT,       TAB,  bringactivetotop
bind  = ALT SHIFT, TAB,  cyclenext, prev
bind  = ALT SHIFT, TAB,  bringactivetotop

# -----------------------------------------------------------------------
# Groups (identical to Omarchy)
# -----------------------------------------------------------------------
bind  = SUPER,         G,   togglegroup
bind  = SUPER ALT,     G,   moveoutofgroup
bind  = SUPER ALT,     LEFT,  moveintogroup, l
bind  = SUPER ALT,     RIGHT, moveintogroup, r
bind  = SUPER ALT,     UP,    moveintogroup, u
bind  = SUPER ALT,     DOWN,  moveintogroup, d
bind  = SUPER ALT,     TAB,   changegroupactive, f
bind  = SUPER ALT SHIFT, TAB, changegroupactive, b
bind  = SUPER CTRL,   LEFT,   changegroupactive, b
bind  = SUPER CTRL,   RIGHT,  changegroupactive, f
bind  = SUPER ALT, mouse_down, changegroupactive, f
bind  = SUPER ALT, mouse_up,   changegroupactive, b

# -----------------------------------------------------------------------
# System
# -----------------------------------------------------------------------
bind  = SUPER CTRL, L,     exec, $locker
bind  = SUPER SHIFT, SPACE, exec, killall -SIGUSR1 waybar   # Toggle waybar

# Screenshot (area)
bind  = , PRINT,         exec, grim -g "$(slurp)" - | wl-copy && grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
# Screenshot (full screen)
bind  = SHIFT, PRINT,    exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# Color picker
bind  = SUPER, PRINT,    exec, hyprpicker -a

# Clipboard history (requires cliphist + wofi)
bind  = SUPER, V,        exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Notifications (mako — identical to Omarchy)
bind  = SUPER,         COMMA,       exec, makoctl dismiss
bind  = SUPER SHIFT,   COMMA,       exec, makoctl dismiss --all
bind  = SUPER ALT,     COMMA,       exec, makoctl invoke
bind  = SUPER SHIFT ALT, COMMA,     exec, makoctl restore

# Show time (no waybar needed)
bind  = SUPER CTRL ALT, T, exec, notify-send -u low "   $(date +"%A %H:%M  ·  %d %B %Y  ·  Week %V")"

# -----------------------------------------------------------------------
# Media & Volume keys (Omarchy-identical, using swayosd-client)
# -----------------------------------------------------------------------
$osdclient = swayosd-client

bindel = , XF86AudioRaiseVolume,  exec, $osdclient --output-volume raise
bindel = , XF86AudioLowerVolume,  exec, $osdclient --output-volume lower
bindel = , XF86AudioMute,         exec, $osdclient --output-volume mute-toggle
bindel = , XF86AudioMicMute,      exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Precise 1% adjustments
bindel = ALT, XF86AudioRaiseVolume,  exec, $osdclient --output-volume +1
bindel = ALT, XF86AudioLowerVolume,  exec, $osdclient --output-volume -1
bindel = ALT, XF86MonBrightnessUp,   exec, brightnessctl set +1%
bindel = ALT, XF86MonBrightnessDown, exec, brightnessctl set 1%-

# Playerctl media controls
bindl  = , XF86AudioNext,  exec, $osdclient --playerctl next
bindl  = , XF86AudioPause, exec, $osdclient --playerctl play-pause
bindl  = , XF86AudioPlay,  exec, $osdclient --playerctl play-pause
bindl  = , XF86AudioPrev,  exec, $osdclient --playerctl previous

# Zoom (identical to Omarchy)
bind  = SUPER CTRL,     Z,  exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bind  = SUPER CTRL ALT, Z,  exec, hyprctl keyword cursor:zoom_factor 1
